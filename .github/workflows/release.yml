name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build keyops (${{ matrix.platform }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest       # GitHub provides arm64 runners for macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller + certifi
        run: pip install pyinstaller certifi

      - name: Build binary
        id: build
        run: bash dist/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyops-${{ matrix.platform }}
          # Upload both the binary and the .sha256 sidecar.
          path: dist/out/keyops.${{ matrix.platform }}*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble SHA256SUMS
        run: |
          # Collect all per-platform .sha256 sidecars into a single manifest.
          find artifacts/ -name '*.sha256' -exec cat {} \; | sort > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag pushed by the developer; no draft / prerelease unless
          # the tag contains a pre-release identifier (e.g. -rc1).
          generate_release_notes: true
          files: |
            artifacts/keyops-darwin-arm64/keyops.darwin-arm64
            artifacts/keyops-darwin-arm64/keyops.darwin-arm64.sha256
            artifacts/keyops-linux-amd64/keyops.linux-amd64
            artifacts/keyops-linux-amd64/keyops.linux-amd64.sha256
            SHA256SUMS
