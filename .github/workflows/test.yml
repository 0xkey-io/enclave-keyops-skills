name: Test

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Unit tests + sync check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run unit tests
        run: python3 -m unittest discover -t . -s tests -v

      - name: Check skill sync (core/ → skills/)
        run: python3 tools/sync-skills.py --check
